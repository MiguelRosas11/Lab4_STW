<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="profile">
        <div class="profile-top">
            <div class="avatar-wrap">
                <img id="avatarImg" class="avatar" src="assets/lv1.gif" alt="Avatar">
            </div>

            <div class="profile-info">
                <h2 id="className">Aprendiz</h2>
                <p id="levelName">Nivel 1</p>
                <p id="xpText">XP: 0 / 50</p>
            </div>
        </div>

        <div class="xp-bar">
            <div id="xpFill" class="xp-fill"></div>
        </div>

        <p id="nextGoal" class="next-goal">Siguiente nivel en 50 XP</p>
    </div>






<div class="box">
    <h2>Agrega una misión</h2>

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" placeholder="Nombre de la misión">

    <label for="descripción">Descripción:</label>
    <input type="text" id="descripción" placeholder="Descripción de la misión">


    <label for="dificultad">Dificultad:</label>

    <select id="dificultad">
        <option value="facil">Fácil</option>
        <option value="normal">Normal</option>
        <option value="dificil">Difícil</option>
    </select>


    <button>Crear misión</button>

</div>

<div class="box">
    <div id="listaMisiones">
    </div>
</div>

</body>


</html>
